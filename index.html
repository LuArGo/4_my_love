<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Carol</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>💌</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Courier+Prime&display=swap" rel="stylesheet">
<style>

:root {
  --bg:      #fce4ec;
  --bg2:     #f8bbd0;
  --br:      #5d4037;
  --brL:     #8d6e63;
  --brD:     #3e2723;
  --cream:   #fffdf7;
  --paper:   #fefaf3;
  --HH:      60px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  min-height:100vh;
  background:var(--bg);
  color:var(--br);
  font-family:'Playfair Display', serif;
  overflow-x:hidden;
}

body::before {
  content:'';
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse at 8% 92%,  rgba(248,187,208,.6) 0%, transparent 44%),
    radial-gradient(ellipse at 92% 6%,  rgba(252,228,236,.8) 0%, transparent 44%),
    radial-gradient(ellipse at 50% 50%, rgba(255,240,245,.3) 0%, transparent 70%);
  pointer-events:none;
}
 
#fh { position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
.fh {
  position:absolute; bottom:-60px;
  color:var(--brL); opacity:.09;
  animation:fhUp linear infinite;
  will-change:transform;
}
@keyframes fhUp {
  0%   { transform:translateY(0) rotate(0deg); opacity:0; }
  6%   { opacity:.09; }
  94%  { opacity:.06; }
  100% { transform:translateY(-115vh) rotate(30deg); opacity:0; }
}
 
#lock {
  position:relative; z-index:10;
  min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:2rem; gap:0;
  animation:fadeInPage .8s ease both;
}
@keyframes fadeInPage {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:none; }
}
.ldeco {
  font-size:1.9rem; letter-spacing:.9rem;
  margin-bottom:1.8rem; opacity:.45;
  animation:fadeInPage .8s .2s ease both;
}
.ltitle {
  font-family:'Dancing Script', cursive;
  font-size:clamp(1.45rem, 5vw, 2.3rem);
  color:var(--brD);
  text-align:center; line-height:1.5;
  margin-bottom:.55rem;
  animation:fadeInPage .8s .3s ease both;
}
.lhint {
  font-size:clamp(.75rem, 2vw, .95rem);
  color:var(--brL); font-style:italic;
  text-align:center; margin-bottom:2.6rem;
  animation:fadeInPage .8s .4s ease both;
}
.lform {
  display:flex; flex-direction:column;
  align-items:center; gap:.9rem;
  width:100%; max-width:290px;
  animation:fadeInPage .8s .5s ease both;
}
#ci {
  width:100%;
  padding:.88rem 1.5rem;
  border:2px solid rgba(93,64,55,.38);
  border-radius:50px;
  background:rgba(255,255,255,.62);
  font-family:'Courier Prime', monospace;
  font-size:1.3rem; letter-spacing:.36rem;
  text-align:center; color:var(--brD);
  outline:none;
  transition:border-color .3s, box-shadow .3s;
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
}
#ci:focus {
  border-color:var(--br);
  box-shadow:0 0 0 4px rgba(93,64,55,.11);
}
#ci.shake {
  animation:shake .42s ease;
  border-color:#c62828;
}
@keyframes shake {
  0%,100%{ transform:translateX(0); }
  18%{ transform:translateX(-9px); }
  36%{ transform:translateX(9px); }
  54%{ transform:translateX(-6px); }
  72%{ transform:translateX(5px); }
}
#ubtn {
  padding:.72rem 2.6rem;
  background:var(--br); color:#fff8f4;
  border:none; border-radius:50px;
  font-family:'Dancing Script', cursive;
  font-size:1.4rem; cursor:pointer;
  box-shadow:0 4px 14px rgba(62,39,35,.26);
  transition:background .22s, transform .15s, box-shadow .22s;
}
#ubtn:hover {
  background:var(--brD); transform:scale(1.05);
  box-shadow:0 6px 18px rgba(62,39,35,.3);
}
#ubtn:active { transform:scale(.96); }
.emsg {
  font-size:.83rem; color:#c62828; font-style:italic;
  text-align:center; min-height:1.2em;
  opacity:0; transition:opacity .3s;
}
.emsg.on { opacity:1; }
 
#ls { display:none; flex-direction:column; min-height:100vh; position:relative; z-index:10; }
#ls.on { display:flex; }
 
#ls.vhs-rew::after,
#ls.vhs-fwd::after {
  content:'';
  position:fixed; inset:0; z-index:999;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,.055) 0px, rgba(0,0,0,.055) 1px,
    transparent 1px, transparent 4px
  );
}
 
#ls.vhs-rew {
  filter:hue-rotate(-22deg) saturate(1.7) contrast(1.1);
  animation:vhsShake .07s steps(1) infinite;
}
@keyframes vhsShake {
  0%  { transform:translateX(0)    skewX(0deg); }
  20% { transform:translateX(-4px) skewX(-.4deg); }
  50% { transform:translateX(3px)  skewX(.3deg); }
  80% { transform:translateX(-2px) skewX(-.2deg); }
  100%{ transform:translateX(0)    skewX(0deg); }
}
 
#ls.vhs-rew #lm {
  animation:vhsGlitch 1.1s steps(1) infinite;
}
@keyframes vhsGlitch {
  0%,89%,100% { clip-path:none; transform:none; }
  90% { clip-path:inset(30% 0 60% 0); transform:translateX(6px); }
  93% { clip-path:inset(60% 0 20% 0); transform:translateX(-5px); }
  96% { clip-path:none; transform:none; }
}
 
#ls.vhs-fwd {
  filter:hue-rotate(14deg) saturate(1.45) brightness(1.09);
}
 
#hm.k7 {
  font-family:'Courier Prime', monospace;
  font-size:clamp(1.1rem, 3.6vw, 1.5rem);
  letter-spacing:.06em;
  color:var(--brD);
}

.tape-zone {
  position:fixed;
  top:var(--HH); bottom:0;
  width:clamp(50px, 16vw, 86px);
  z-index:400;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:.5rem;
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.tape-zone.playable { display:flex; }
 
.tape-rew {
  left:0;
  background:linear-gradient(to right,
    rgba(93,64,55,.07) 0%, transparent 100%);
}
.tape-fwd {
  right:0;
  background:linear-gradient(to left,
    rgba(93,64,55,.07) 0%, transparent 100%);
}
 
.tz-icon {
  font-size:1.45rem;
  color:var(--brL);
  opacity:0;
  transition:opacity .18s, transform .18s;
  transform:scale(.82);
  line-height:1;
}
.tz-label {
  font-family:'Courier Prime', monospace;
  font-size:.58rem;
  letter-spacing:.14em;
  color:var(--brL);
  opacity:0;
  transition:opacity .18s;
  text-transform:uppercase;
}
.tape-zone:hover .tz-icon,
.tape-zone.pressing .tz-icon {
  opacity:.75;
  transform:scale(1);
}
.tape-zone:hover .tz-label,
.tape-zone.pressing .tz-label { opacity:.55; }
.tape-zone.pressing .tz-icon  { opacity:1; }
 
#hdr {
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:var(--HH);
  background:rgba(252,228,236,.94);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(93,64,55,.13);
  display:flex; align-items:center; justify-content:center;
  padding:0 1.2rem;
}
#hm {
  font-family:'Dancing Script', cursive;
  font-size:clamp(1.25rem, 4vw, 1.7rem);
  color:var(--br); text-align:center;
  transition:opacity .28s ease;
  line-height:1.3;
}
#hm.vol {
  font-size:clamp(1.35rem, 4.5vw, 1.85rem);
  font-weight:700; color:var(--brD);
  animation:hpulse 1.1s ease-in-out infinite;
}
@keyframes hpulse { 0%,100%{ opacity:1; } 50%{ opacity:.62; } }
#hm.lyr {
  font-family:'Playfair Display', serif;
  font-style:italic;
  font-size:clamp(1.15rem, 3.6vw, 1.55rem);
  color:var(--brL);
}
 
#lm {
  flex:1;
  padding-top:var(--HH);
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding-bottom:3.5rem;
}
 
#cl {
  position:relative;
  margin-top:clamp(1rem, 3vw, 2rem);
  width:min(680px, 95vw);
  height:clamp(300px, calc(100dvh - var(--HH) - 3.5rem), 435px);
  background:#f7edd4;
  border-radius:4px;
  overflow:visible;
  box-shadow:
    0 8px 34px rgba(93,64,55,.22),
    0 2px 8px rgba(93,64,55,.12),
    inset 0 0 0 1px rgba(140,100,40,.18);
}
#cl::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.2) 0%, transparent 55%);
  pointer-events:none; border-radius:4px; z-index:2;
}
.env-lines {
  position:absolute; inset:0;
  width:100%; height:100%;
  pointer-events:none;
  border-radius:4px;
  overflow:hidden;
  z-index:1;
}
.env-addr {
  position:absolute;
  bottom:22%; left:50%;
  transform:translateX(-50%);
  text-align:center;
  width:65%;
  z-index:3;
  pointer-events:none;
}
.clt {
  font-family:'Dancing Script', cursive;
  font-size:clamp(1.55rem, 4.5vw, 2.3rem);
  font-weight:700; color:var(--brD);
  margin-bottom:.3rem;
}
.cls {
  font-family:'Playfair Display', serif;
  font-size:clamp(.85rem, 2vw, 1.05rem);
  font-style:italic; color:var(--brL);
}
#seal {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%, -58%);
  z-index:10;
  cursor:pointer;
  filter:drop-shadow(0 7px 16px rgba(0,0,0,.32));
  transition:transform .32s ease, filter .32s ease;
  user-select:none; -webkit-tap-highlight-color:transparent;
  will-change:transform;
}
#seal:hover {
  transform:translate(-50%, -58%) scale(1.11) rotate(-5deg);
  filter:drop-shadow(0 11px 22px rgba(0,0,0,.38));
}
#seal:active {
  transform:translate(-50%, -58%) scale(.92) rotate(2deg);
}
.clfrom {
  position:absolute; bottom:1.4rem; left:1.8rem;
  text-align:left; line-height:1.85; z-index:3;
}
.clfrom span {
  display:block;
  font-family:'Dancing Script', cursive;
  font-size:clamp(.82rem, 1.7vw, .98rem); color:var(--brL);
}
 
#ol {
  display:none;
  margin-top:clamp(.8rem, 2vw, 1.8rem);
  width:min(860px, 97vw);
  min-height:calc(100dvh - var(--HH) - 3rem);
  background:var(--paper); border-radius:3px;
  padding:clamp(1.8rem, 4.5vw, 3.5rem) clamp(1.2rem, 4vw, 3.2rem);
  box-shadow:
    0 10px 48px rgba(93,64,55,.18),
    0 2px 8px rgba(93,64,55,.1),
    inset 0 0 0 1px rgba(93,64,55,.07);
  background-image:
    repeating-linear-gradient(
      transparent, transparent 32px,
      rgba(93,64,55,.042) 32px, rgba(93,64,55,.042) 33px);
  position:relative;
}
#ol::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.28) 0%, transparent 50%);
  pointer-events:none; border-radius:3px;
}
#ol.on { display:block; }
.orn {
  text-align:center; font-size:1.25rem;
  margin-bottom:2rem; opacity:.4;
  letter-spacing:.5rem;
}
#lb {
  font-family:'Courier Prime', monospace;
  font-size:clamp(.95rem, 2.6vw, 1.08rem);
  line-height:2.1;
  color:var(--brD);
  min-height:160px;
  position:relative; z-index:1;
}
.ll      { display:block; min-height:1.9em; }
.lb-gap  { display:block; height:1.5em; }
.cur {
  display:inline-block;
  width:2px; height:.85em;
  background:var(--br);
  margin-left:1px;
  vertical-align:middle;
  animation:blink .85s step-end infinite;
}
@keyframes blink { 50%{ opacity:0; } }
 
#sig {
  margin-top:3rem; text-align:right;
  opacity:0; transition:opacity 1.3s ease;
  pointer-events:none;
  position:relative; z-index:1;
}
#sig.on {
  opacity:1;
  pointer-events:auto;
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
#sig:hover { opacity:.72; }
#sig .sn {
  display:block;
  font-family:'Dancing Script', cursive;
  font-size:clamp(1.1rem, 3.2vw, 1.45rem);
  font-weight:600; color:var(--br);
  line-height:1.7;
}
 
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--brL); border-radius:3px; }
</style>
</head>
<body>
 
<div id="fh"></div>
 
<div id="lock">
  <div class="ldeco">🌸 💌 🌸</div>
  <h1 class="ltitle">Digite o código para<br>receber seu presente:</h1>
  <p class="lhint">Dica: o dia que nasceu o amor da minha vida.</p>

    <input type="tel" id="ci" maxlength="8" placeholder="DDMMAAAA"

</div>
 
<div id="ls">
 
  <div id="tz-l" class="tape-zone tape-rew" aria-label="Rebobinar">

  </div>
  <div id="tz-r" class="tape-zone tape-fwd" aria-label="Avançar">

  <header id="hdr">

  <main id="lm">
 
    <div id="cl">
      <svg class="env-lines" viewBox="0 0 100 62" preserveAspectRatio="none"

        <polygon points="0,0 0,62 50,31"   fill="rgba(150,115,50,.09)"/>
        <polygon points="100,0 100,62 50,31" fill="rgba(150,115,50,.09)"/>

      <div class="env-addr">
        <div class="clt">Feliz Aniversário</div>
        <div class="cls">amor da minha vida</div>
      </div>
 
      <div id="seal" role="button" tabindex="0" aria-label="Toque para abrir a carta">
        <svg width="118" height="118" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="wf" x="-25%" y="-25%" width="150%" height="150%">
              <feTurbulence type="turbulence" baseFrequency="0.042 0.068"

              <feDisplacementMap in="SourceGraphic" in2="turb"

            </filter>

              <feGaussianBlur stdDeviation="4.5"/>

            <radialGradient id="wg1" cx="36%" cy="29%" r="72%">
              <stop offset="0%"   stop-color="#df4545"/>

                  stroke="rgba(15,0,0,.4)" stroke-width=".9"/>
          <path d="M50 64 C50 64 30 51 30 39 C30 31 37 27 43 31

                   C63 27 70 31 70 39 C70 51 50 64 50 64Z"
                fill="rgba(255,210,205,.75)" stroke="rgba(50,0,0,.38)" stroke-width="1.3"/>

                   fill="rgba(255,225,210,.42)" transform="rotate(-25,39,30)"/>

      </div>
 
      <div class="clfrom">
        <span>De: Lucca</span>
        <span>Para: meu amor</span>

    </div>
 
    <div id="ol">
      <div class="orn">✿ ♡ ✿</div>

  </main>
</div>

<audio id="ab" src="audio/instrumental_bg.mp3" preload="auto" loop></audio>
 
<script>
(function(){
  const c  = document.getElementById('fh');
  const ch = ['♥','♡','✿','❀','✾','❣'];
  for(let i = 0; i < 18; i++){
    const el = document.createElement('span');
    el.className = 'fh';
    el.textContent = ch[i % ch.length];
    el.style.left              = (Math.random() * 100) + 'vw';
    el.style.fontSize          = (.55 + Math.random() * .85) + 'rem';
    el.style.animationDuration = (14 + Math.random() * 22) + 's';
    el.style.animationDelay    = (Math.random() * 28) + 's';
    c.appendChild(el);
  }
})();
 
const CODE = '01041999';
const ciEl = document.getElementById('ci');
const emEl = document.getElementById('em');
 
function tryUnlock() {
  if (ciEl.value.replace(/\D/g,'') === CODE) {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('ls').classList.add('on');
  } else {
    ciEl.classList.add('shake');
    emEl.classList.add('on');
    ciEl.value = '';
    setTimeout(() => ciEl.classList.remove('shake'), 460);
  }
}
document.getElementById('ubtn').addEventListener('click', tryUnlock);
ciEl.addEventListener('keydown', e => {
  emEl.classList.remove('on');
  if (e.key === 'Enter') tryUnlock();
});
document.getElementById('seal').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') openLetter();
});
 
const AM   = document.getElementById('am');
const AB   = document.getElementById('ab');
const hm   = document.getElementById('hm');
const cl   = document.getElementById('cl');
const ol   = document.getElementById('ol');
const lb   = document.getElementById('lb');
const sig  = document.getElementById('sig');
const lsEl = document.getElementById('ls');
const tzL  = document.getElementById('tz-l');
const tzR  = document.getElementById('tz-r');
 
let isOpen   = false;
let playing  = false;
let finished = false;
let timers   = [];
let rafId    = null;
 
function setHdr(txt, cls) {
  hm.style.transition = 'opacity .28s ease';
  hm.style.opacity = '0';
  setTimeout(() => {
    hm.className   = cls || '';

const MEND = 138500;
 
const textEvents = (function() {
  const arr = [];
  let pendingGap = false;
  EV.forEach(ev => {
    if (ev.bl) pendingGap = true;
    if (ev.tx != null) {
      ev.needsGap   = pendingGap;
      pendingGap    = false;
      ev.lineEl     = null;
      ev._lastChars = -1;
      arr.push(ev);
    }
  });
  arr.forEach((ev, i) => {
    ev.endT = i < arr.length - 1 ? arr[i + 1].t : MEND;
  });
  return arr;
})();
 
let lastLyrIdx = -1;
let addedLines = -1;
let cursorEl   = null;
 
function syncLoop() {
  if (!playing || finished) return;
  const t = AM.currentTime * 1000;
 
  if (!tapeMode) {
    let lyrIdx = -1;
    for (let i = EV.length - 1; i >= 0; i--) {
      if (EV[i].t !== undefined && t >= EV[i].t) { lyrIdx = i; break; }
    }
    if (lyrIdx !== lastLyrIdx) {
      lastLyrIdx = lyrIdx;
      if (lyrIdx >= 0) {
        const txt = EV[lyrIdx].ly;
        if (hm.textContent !== txt) {
          hm.style.transition = 'opacity .2s';
          hm.style.opacity = '0';
          setTimeout(() => {
            hm.className = 'lyr';
            hm.textContent = txt;
            hm.style.opacity = '1';
          }, 200);
        }
      }
    }
  }
 
  while (addedLines >= 0 && textEvents[addedLines] && textEvents[addedLines].t > t) {
    const ev = textEvents[addedLines];
    if (ev.lineEl) {
      if (ev.needsGap) {
        const mg = ev.lineEl.previousSibling;
        if (mg && mg.classList && mg.classList.contains('lb-gap')) mg.remove();
      }
      ev.lineEl.remove();
      ev.lineEl     = null;
      ev._lastChars = -1;
    }
    addedLines--;
  }
 
  let txtIdx = -1;
  for (let i = textEvents.length - 1; i >= 0; i--) {
    if (textEvents[i].t !== undefined && t >= textEvents[i].t) { txtIdx = i; break; }
  }
 
  while (addedLines < txtIdx) {
    addedLines++;
    const ev = textEvents[addedLines];
    if (ev.needsGap) {
      const g = document.createElement('span');
      g.className = 'lb-gap';
      lb.appendChild(g);
    }
    const line = document.createElement('span');
    line.className = 'll';
    lb.appendChild(line);
    ev.lineEl = line;
    if (addedLines < txtIdx) {
      line.textContent = ev.tx;
      ev._lastChars = ev.tx.length;
    }
  }
 
  if (txtIdx >= 0) {
    const ev = textEvents[txtIdx];
    if (ev.lineEl && ev.t !== undefined) {
      const elapsed   = Math.max(0, t - ev.t);
      const charDelay = Math.min(68, (ev.endT - ev.t) * 0.78 / ev.tx.length);
      const chars     = Math.min(Math.floor(elapsed / charDelay), ev.tx.length);
      if (chars !== ev._lastChars) {
        ev._lastChars = chars;
        ev.lineEl.textContent = ev.tx.slice(0, chars);
        if (chars < ev.tx.length) {
          if (!cursorEl) { cursorEl = document.createElement('span'); cursorEl.className = 'cur'; }
          ev.lineEl.appendChild(cursorEl);
          if (!tapeMode) ev.lineEl.scrollIntoView({ behavior:'smooth', block:'nearest' });
        } else {
          if (cursorEl && cursorEl.parentNode === ev.lineEl) cursorEl.remove();
        }
      }
    }
  }
 
  rafId = requestAnimationFrame(syncLoop);
}

function finishMusic() {

const REW_RATE = 4;
const FFW_RATE = 2;
 
let tapeMode  = null;
let tapeRafId = null;
let tapePrevT = null;
 
let revCtx     = null;
let revBuffer  = null;
let revSource  = null;
let revReady   = false;
let revLoading = false;
 
async function prepareReversed() {
  if (revReady || revLoading) return;
  revLoading = true;
  try {
    const src = AM.getAttribute('src') || 'audio/love-like-you.mp3';
    const res = await fetch(src);
    const ab  = await res.arrayBuffer();
    revCtx    = new (window.AudioContext || window.webkitAudioContext)();
    const dec = await revCtx.decodeAudioData(ab);
    revBuffer = revCtx.createBuffer(dec.numberOfChannels, dec.length, dec.sampleRate);
    for (let c = 0; c < dec.numberOfChannels; c++) {
      const s = dec.getChannelData(c);
      const d = revBuffer.getChannelData(c);
      for (let i = 0; i < s.length; i++) d[i] = s[s.length - 1 - i];
    }
    revReady = true;
  } catch(e) {
    console.warn('[K7] buffer reverso indisponível:', e);
  }
  revLoading = false;
}
 
function playRevFrom(currentSec) {
  if (!revReady) return;
  stopRevSource();
  const offset = Math.max(0, revBuffer.duration - currentSec);
  revSource = revCtx.createBufferSource();
  revSource.buffer = revBuffer;
  revSource.playbackRate.value = REW_RATE;
  revSource.connect(revCtx.destination);
  revSource.start(0, offset);
}
 
function stopRevSource() {
  if (revSource) {
    try { revSource.stop(); } catch(_) {}
    revSource.disconnect();
    revSource = null;
  }
}
 
function startRewind() {
  if (!playing || finished || tapeMode === 'rew') return;
  if (tapeMode === 'fwd') stopTape();
  tapeMode = 'rew';
  tzL.classList.add('pressing');
  AM.pause();
  if (revCtx && revCtx.state === 'suspended') revCtx.resume();
  playRevFrom(AM.currentTime);
  lsEl.classList.add('vhs-rew');
  hm.style.transition = 'none';
  hm.className   = 'k7';
  hm.textContent = '◀◀  REBOBINANDO';
  tapePrevT = null;
  tapeRafId = requestAnimationFrame(rewTick);
}
 
function rewTick(now) {
  if (tapeMode !== 'rew') return;
  if (tapePrevT !== null) {
    const dt      = (now - tapePrevT) / 1000;
    const newTime = AM.currentTime - dt * REW_RATE;
    if (newTime <= 0) {
      AM.currentTime = 0;
      stopTape();
      AM.play().catch(() => {});
      lastLyrIdx = -1;
      rafId = requestAnimationFrame(syncLoop);
      return;
    }
    AM.currentTime = newTime;
    const last = lb.lastElementChild;
    if (last) last.scrollIntoView({ behavior:'instant', block:'end' });
  }
  tapePrevT = now;
  tapeRafId = requestAnimationFrame(rewTick);
}
 
function startFfwd() {
  if (!playing || finished || tapeMode === 'fwd') return;
  if (tapeMode === 'rew') stopTape();
  tapeMode = 'fwd';
  tzR.classList.add('pressing');
  AM.playbackRate = FFW_RATE;
  lsEl.classList.add('vhs-fwd');
  hm.style.transition = 'none';
  hm.className   = 'k7';
  hm.textContent = '▶▶  AVANÇANDO';
}
 
function stopTape() {
  if (!tapeMode) return;
  const was = tapeMode;
  tapeMode = null;
  if (tapeRafId) { cancelAnimationFrame(tapeRafId); tapeRafId = null; }
  tapePrevT = null;
  tzL.classList.remove('pressing');
  tzR.classList.remove('pressing');
  lsEl.classList.remove('vhs-rew', 'vhs-fwd');
  if (was === 'rew') {
    stopRevSource();
    if (playing && !finished) AM.play().catch(() => {});
  } else {
    AM.playbackRate = 1;
  }
  lastLyrIdx = -1;
}
 
function bindZone(el, fn) {
  el.addEventListener('touchstart',  e => { e.preventDefault(); fn(); },       { passive:false });
  el.addEventListener('touchend',    e => { e.preventDefault(); stopTape(); }, { passive:false });
  el.addEventListener('touchcancel', e => { e.preventDefault(); stopTape(); }, { passive:false });
  el.addEventListener('mousedown',   e => { e.preventDefault(); fn(); });
  el.addEventListener('mouseup',     () => stopTape());
  el.addEventListener('mouseleave',  () => { if (tapeMode) stopTape(); });
}
bindZone(tzL, startRewind);
bindZone(tzR, startFfwd);
 
document.addEventListener('mouseup',  () => { if (tapeMode) stopTape(); });
document.addEventListener('touchend', () => { if (tapeMode) stopTape(); }, { passive:true });
